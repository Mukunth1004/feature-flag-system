<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Admin | Feature Flag System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    #logout-btn { background: #e74c3c; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .container { max-width: 860px; margin: 36px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 10px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    h2 { font-size: 1.15rem; margin-bottom: 18px; color: #1a1a2e; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 5px; color: #555; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #1a1a2e; }
    .form-group { margin-bottom: 14px; }
    button { background: #1a1a2e; color: #fff; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: background 0.2s; }
    button:hover { background: #16213e; }
    .msg { margin-top: 12px; font-size: 0.88rem; padding: 8px 12px; border-radius: 6px; }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error { background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f8f9fa; font-weight: 600; color: #555; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; background: #e8f4fd; color: #1a6598; }
    #app { display: none; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f2f5; }
    .login-card { background: #fff; border-radius: 10px; padding: 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
    .login-card h2 { margin-bottom: 6px; }
    .login-card p { font-size: 0.85rem; color: #888; margin-bottom: 22px; }
    .empty { color: #aaa; font-size: 0.9rem; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h2>Super Admin Login</h2>
    <p>Feature Flag Management System</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="superadmin@flagsystem.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button onclick="login()" style="width:100%">Login</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- App Screen -->
<div id="app">
  <header>
    <h1>Super Admin Dashboard</h1>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </header>
  <div class="container">

    <!-- Create Org -->
    <div class="card">
      <h2>Create Organization</h2>
      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="org-name" placeholder="e.g. Acme Corp" />
      </div>
      <button onclick="createOrg()">Create Organization</button>
      <div id="org-msg"></div>
    </div>

    <!-- Org List -->
    <div class="card">
      <h2>Organizations</h2>
      <div id="org-list"><p class="empty">Loading...</p></div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:4000/api';
  let token = localStorage.getItem('sa_token');

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
  }

  async function apiFetch(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { headers, ...opts });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    try {
      const data = await apiFetch('/super-admin/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      token = data.token;
      localStorage.setItem('sa_token', token);
      showApp();
    } catch (e) {
      showMsg('login-msg', e.message, 'error');
    }
  }

  function logout() {
    token = null;
    localStorage.removeItem('sa_token');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadOrgs();
  }

  async function createOrg() {
    const name = document.getElementById('org-name').value.trim();
    if (!name) return showMsg('org-msg', 'Organization name is required', 'error');
    try {
      await apiFetch('/super-admin/organizations', {
        method: 'POST',
        body: JSON.stringify({ name })
      });
      document.getElementById('org-name').value = '';
      showMsg('org-msg', `Organization "${name}" created successfully`, 'success');
      loadOrgs();
    } catch (e) {
      showMsg('org-msg', e.message, 'error');
    }
  }

  async function loadOrgs() {
    try {
      const orgs = await apiFetch('/super-admin/organizations');
      const el = document.getElementById('org-list');
      if (!orgs.length) {
        el.innerHTML = '<p class="empty">No organizations yet. Create one above.</p>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Created At</th></tr></thead>
          <tbody>
            ${orgs.map(o => `
              <tr>
                <td><span class="badge">ID: ${o.id}</span></td>
                <td>${o.name}</td>
                <td>${new Date(o.created_at + ' UTC').toLocaleString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      document.getElementById('org-list').innerHTML = '<p class="empty">Failed to load organizations.</p>';
    }
  }

  // Enter key to login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
      login();
    }
  });

  // Auto-login if token exists
  if (token) showApp();
</script>
</body>
</html>
